version: '3'

vars:
  BINARY: bin/saucer

tasks:
  default:
    desc: Build the binary (default task)
    cmds:
      - task: build

  build:
    desc: Compile the binary
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY}}"
    cmds:
      - go build -o {{.BINARY}} .

  run:
    desc: Run the app without building a binary
    cmds:
      - go run .

  test:
    desc: Run tests
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format source files
    cmds:
      - gofmt -l -w .

  install:
    desc: Install the binary to $GOBIN
    cmds:
      - go install .

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin
